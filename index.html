<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>💰 Personal Finance Tracker</h1>

    <div class="summary">

        <div class="card">
            <h3>Balance</h3>
            <p id="balance">$0.00</p>
        </div>

        <div class="card">
            <h3>Income</h3>
            <p id="income">$0.00</p>
        </div>

        <div class="card">
            <h3>Expenses</h3>
            <p id="expenses">$0.00</p>
        </div>

    </div>

    <div class="form">

        <input
            id="description"
            type="text"
            placeholder="Description">

        <input
            id="amount"
            type="number"
            placeholder="Amount">

        <select id="type">

            <option value="income">Income</option>

            <option value="expense">Expense</option>

        </select>

        <button id="addButton">
            Add Transaction
        </button>

    </div>

    <h2>Transactions</h2>

    <ul id="transactionList">

    </ul>

</div>

<script src="script.js"></script>

</body>

</html>
